# robot_localization EKF configuration for Big Bertha (real robot).
#
# Fuses /leg_odom (twist from leg odometry) + /imu (orientation + angular
# velocity) into a smoothed odom->base_link transform and /odom_filtered.
/**:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.1
    two_d_mode: false
    publish_tf: true
    publish_acceleration: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # --- Leg odometry (twist only, differential mode) ---
    odom0: /leg_odom
    odom0_config:
      [false, false, false,
       false, false, false,
       true,  true,  true,
       false, false, true,
       false, false, false]
    odom0_differential: true
    odom0_relative: false
    odom0_queue_size: 10
    odom0_nodelay: false

    # --- IMU (orientation + angular velocity) ---
    imu0: /imu
    imu0_config:
      [false, false, false,
       true,  true,  true,
       false, false, false,
       true,  true,  true,
       false, false, false]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 10
    imu0_nodelay: false
    imu0_remove_gravitational_acceleration: false
